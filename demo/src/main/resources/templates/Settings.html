<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Taskmaster Settings</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/settings.css}">
</head>
<body>
<div class="container my-5">
    <h2 class="mb-4">Settings</h2>

    <!-- Theme and Color Scheme Settings -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header">
            Theme Settings
        </div>
        <div class="card-body">
            <!-- Dark Mode / Light Mode Toggle -->
            <div class="form-group">
                <label for="themeToggle">Dark Mode / Light Mode</label>
                <div class="custom-control custom-switch">
                    <input type="checkbox" class="custom-control-input" id="themeToggle">
                    <label class="custom-control-label" for="themeToggle">Toggle Dark Mode</label>
                </div>
            </div>
            <!-- Custom Color Scheme -->
            <div class="form-group">
                <label>Custom Color Scheme</label>
                <div>
                    <span class="color-scheme-btn color-blue" id="color-blue" onclick="setColorScheme('blue')"></span>
                    <span class="color-scheme-btn color-red" id="color-red" onclick="setColorScheme('red')"></span>
                    <span class="color-scheme-btn color-green" id="color-green"
                          onclick="setColorScheme('green')"></span>
                    <span class="color-scheme-btn color-purple" id="color-purple"
                          onclick="setColorScheme('purple')"></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Reminder Alerts Settings -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header">
            Reminder Alerts
        </div>
        <div class="card-body">
            <form id="reminderForm">
                <div class="form-group">
                    <label>Choose Reminder Methods</label>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="reminderEmail">
                        <label class="form-check-label" for="reminderEmail">Email Alerts</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="reminderSMS">
                        <label class="form-check-label" for="reminderSMS">SMS Alerts</label>
                    </div>
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="reminderPush">
                        <label class="form-check-label" for="reminderPush">Push Notifications</label>
                    </div>
                </div>
                <div class="form-group">
                    <label for="reminderTime">Set Default Reminder Time</label>
                    <input type="time" class="form-control" id="reminderTime">
                </div>
                <button type="submit" class="btn btn-primary">Save Reminder Settings</button>
            </form>
        </div>
    </div>

    <!-- Dashboard Button -->
    <div class="text-center">
        <a th:href="@{/dashboard}" class="btn btn-outline-primary">Go to Dashboard</a>
    </div>
</div>

<!-- JavaScript -->
<script th:src="@{/js/settings.js}"></script>

<!-- Optional JavaScript and Bootstrap Bundle -->
<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
