<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading - TaskMaster</title>
    <meta name="description" content="TaskMaster is loading your personalized task management experience.">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'/></svg>">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 font-inter flex items-center justify-center">
    <div class="text-center">
        <!-- Logo -->
        <div class="mb-8 animate-bounce-slow">
            <div class="mx-auto w-20 h-20 bg-blue-600 rounded-full flex items-center justify-center shadow-2xl">
                <i class="fas fa-check-circle text-white text-3xl"></i>
            </div>
        </div>
        
        <!-- Loading Animation -->
        <div class="mb-6">
            <div class="flex justify-center space-x-1">
                <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 0ms;"></div>
                <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 150ms;"></div>
                <div class="w-3 h-3 bg-blue-600 rounded-full animate-bounce" style="animation-delay: 300ms;"></div>
            </div>
        </div>
        
        <!-- Loading Text -->
        <h1 class="text-2xl font-bold text-slate-900 mb-2">TaskMaster</h1>
        <p id="loading-text" class="text-slate-600 mb-8">Preparing your workspace...</p>
        
        <!-- Progress Bar -->
        <div class="w-64 mx-auto bg-slate-200 rounded-full h-2 mb-4">
            <div id="progress-bar" class="bg-blue-600 h-2 rounded-full transition-all duration-500 ease-out" style="width: 0%"></div>
        </div>
        
        <!-- Progress Percentage -->
        <p id="progress-text" class="text-sm text-slate-500">0%</p>
    </div>

    <!-- JavaScript -->
    <script src="@{/js/loading.js}"></script>
</body>
</html>
