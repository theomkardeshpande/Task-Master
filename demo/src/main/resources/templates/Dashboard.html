<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
</head>
<body class="dashboard-page">
<div class="d-flex">
    <!-- Sidebar -->
    <aside class="col-5 sidebar bg-white border-end">
        <div class="p-3">
            <div class="d-flex align-items-center mb-4">
                <i class="fas fa-check-circle text-primary me-2 fs-4"></i>
                <span class="fw-bold fs-4">TaskMaster</span>
            </div>

            <nav class="nav flex-column">
                <a class="nav-link active" th:href="@{/dashboard}">
                    <i class="fas fa-check-circle me-2"></i>
                    My Tasks
                </a>
                <a class="nav-link" href="#">
                    <i class="fas fa-cog me-2"></i>
                    Settings
                </a>
            </nav>
        </div>

        <div class="mt-auto p-3 border-top">
            <div class="d-flex align-items-center mb-3">
                <img src="" th:src="@{/img/profiler.jpg}" alt="User" width="30" height="17"
                     class="rounded-circle me-2 img-fluid">
                <div>
                    <div class="fw-medium fullname">John Doe</div>
                    <small class="text-muted email">john@example.com</small>
                </div>
            </div>
            <button class="btn btn-outline-secondary btn-sm w-100" onclick="signOut()">
                <i class="fas fa-sign-out-alt me-2"></i>
                Sign Out
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-grow-1">
        <!-- Mobile Header -->
        <header class="d-md-none bg-white p-3 border-bottom">
            <div class="d-flex justify-content-between align-items-center">
                <div class="d-flex align-items-center">
                    <i class="fas fa-check-circle text-primary me-2"></i>
                    <span class="fw-bold">TaskMaster</span>
                </div>
                <button class="btn btn-outline-secondary btn-sm" type="button" data-bs-toggle="offcanvas"
                        data-bs-target="#mobileMenu">
                    <i class="fas fa-user"></i>
                </button>
            </div>
        </header>

        <!-- Dashboard Content -->
        <div class="container-fluid p-4">
            <div class="mb-4">
                <h1 class="h2 fw-bold mb-2">My Tasks</h1>
                <p class="text-muted">Welcome back! You have <span id="remainingTasks">4</span> tasks remaining.</p>
            </div>

            <!-- Search and Add Task -->
            <div class="row mb-4">
                <div class="col-md-8">
                    <div class="position-relative">
                        <i class="fas fa-search position-absolute start-0 top-50 translate-middle-y ms-3"></i>
                        <input type="text" class="form-control ps-5"
                               placeholder="Search tasks..." id="searchInput">
                    </div>
                </div>
                <div class="col-md-4 mt-2 mt-md-0">
                    <button class="btn btn-primary w-100" data-bs-toggle="modal" data-bs-target="#addTaskModal">
                        <i class="fas fa-plus me-2"></i>
                        Add New Task
                    </button>
                </div>
            </div>

            <!-- Tasks List -->
            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white border-bottom">
                    <h5 class="mb-0">All Tasks</h5>
                </div>
                <div class="card-body p-0">
                    <div id="tasksList">
                        <!-- Tasks will be populated by JavaScript -->
                    </div>
                </div>
                <div class="card-footer bg-white text-center">
                    <button class="btn btn-link text-primary">View All Tasks</button>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Mobile Menu Offcanvas -->
<div class="offcanvas offcanvas-end" tabindex="-1" id="mobileMenu">
    <div class="offcanvas-header">
        <h5 class="offcanvas-title">Menu</h5>
        <button type="button" class="btn-close" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body">
        <div class="d-flex align-items-center mb-3">
            <img th:src="@{/img/profiler.jpg}" alt="User" class="rounded-circle me-2" src="">
            <div>
                <div class="fw-medium fullname">John Doe</div>
                <small class="text-muted email">john@example.com</small>
            </div>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="#">
                <i class="fas fa-check-circle me-2"></i>
                My Tasks
            </a>
            <a class="nav-link" href="#">
                <i class="fas fa-cog me-2"></i>
                Settings
            </a>
        </nav>
        <hr>
        <button class="btn btn-outline-secondary w-100" onclick="signOut()">
            <i class="fas fa-sign-out-alt me-2"></i>
            Sign Out
        </button>
    </div>
</div>

<!-- Add Task Modal -->
<div class="modal fade" id="addTaskModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Add New Task</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="addTaskForm">
                    <div class="mb-3">
                        <label for="taskTitle" class="form-label">Task Title</label>
                        <input type="text" class="form-control" id="taskTitle" placeholder="Enter task title" required>
                    </div>
                    <div class="mb-3">
                        <label for="taskDescription" class="form-label">Task Description</label>
                        <textarea class="form-control" id="taskDescription" rows="3"
                                  placeholder="Enter task description" required></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="addTask()">Add Task</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/dashboardLogic.js}"></script>
</body>
</html>
