<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - TaskMaster</title>
    <meta name="description" content="Manage your tasks efficiently with TaskMaster dashboard.">
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" th:href="@{https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css}">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/static/css/styles.css}">    
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'/></svg>">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 font-inter">
    <!-- Skip to main content -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-50">
        Skip to main content
    </a>

    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200 sticky top-0 z-40" role="navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a href="./dashboard.html" class="flex items-center space-x-2 group focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded-lg">
                    <i class="fas fa-check-circle text-2xl text-blue-600 group-hover:text-blue-700 transition-colors duration-200"></i>
                    <span class="text-xl font-bold text-slate-900">TaskMaster</span>
                </a>
                
                <!-- User Menu -->
                <div class="flex items-center space-x-4">
                    <span id="user-greeting" class="text-slate-600 hidden sm:block">Welcome back!</span>
                    <div class="relative">
                        <button
                            id="user-menu-btn"
                            class="flex items-center space-x-2 p-2 rounded-lg hover:bg-slate-100 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2"
                            aria-expanded="false"
                            aria-haspopup="true"
                        >
                            <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center">
                                <i class="fas fa-user text-white text-sm"></i>
                            </div>
                            <i class="fas fa-chevron-down text-slate-400 text-sm"></i>
                        </button>
                        
                        <!-- Dropdown Menu -->
                        <div
                            id="user-menu"
                            class="absolute right-0 mt-2 w-48 bg-white rounded-lg shadow-lg border border-slate-200 py-1 hidden opacity-0 transform scale-95 transition-all duration-200 origin-top-right z-50"
                            role="menu"
                        >
                            <button id="dark-mode-toggle" class="block w-full text-left px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 transition-colors duration-200" role="menuitem">
                                <i class="fas fa-moon mr-2"></i><span class="dark-mode-text">Dark Mode</span>
                            </button>
                            <hr class="my-1 border-slate-200">
                            <a href="settings.html" class="block px-4 py-2 text-sm text-slate-700 hover:bg-slate-100 transition-colors duration-200" role="menuitem">
                                <i class="fas fa-cog mr-2"></i>Settings
                            </a>
                            <hr class="my-1 border-slate-200">
                            <button id="logout-btn" class="block w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 transition-colors duration-200" role="menuitem">
                                <i class="fas fa-sign-out-alt mr-2"></i>Sign Out
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Dashboard Header -->
        <div class="mb-8 animate-slide-in-bottom">
            <h1 class="text-3xl font-bold text-slate-900 mb-2">Dashboard</h1>
            <p class="text-slate-600">Manage your tasks and track your progress</p>
        </div>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-6 animate-fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-slate-600">Total Tasks</p>
                        <p id="total-tasks" class="text-2xl font-bold text-slate-900">0</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-list text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-6 animate-fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-slate-600">Completed</p>
                        <p id="completed-tasks" class="text-2xl font-bold text-green-600">0</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-check-circle text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
            
            <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-6 animate-fade-in">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm font-medium text-slate-600">Pending</p>
                        <p id="pending-tasks" class="text-2xl font-bold text-orange-600">0</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-lg flex items-center justify-center">
                        <i class="fas fa-clock text-orange-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- Task Management Section -->
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <!-- Add Task Form -->
            <div class="lg:col-span-1">
                <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-6 animate-slide-in-left">
                    <h2 class="text-xl font-semibold text-slate-900 mb-4">Add New Task</h2>
                    
                    <form id="add-task-form" class="text-slate-800 space-y-4">
                        <div>
                            <label for="task-title" class="block text-sm font-medium text-slate-700 mb-2">
                                Task Title
                            </label>
                            <input
                                type="text"
                                id="task-title"
                                name="title"
                                required
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                placeholder="Enter task title"
                            >
                        </div>
                        
                        <div>
                            <label for="task-description" class="block text-sm font-medium text-slate-700 mb-2">
                                Description (Optional)
                            </label>
                            <textarea
                                id="task-description"
                                name="description"
                                rows="3"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 resize-none"
                                placeholder="Enter task description"
                            ></textarea>
                        </div>
                        
                        <div>
                            <label for="task-priority" class="block text-sm font-medium text-slate-700 mb-2">
                                Priority
                            </label>
                            <select
                                id="task-priority"
                                name="priority"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                            >
                                <option value="low">Low</option>
                                <option value="medium" selected>Medium</option>
                                <option value="high">High</option>
                            </select>
                        </div>
                        <div>
                            <label for="task-due-date" class="block text-sm font-medium text-slate-700 mb-2">
                                Due Date (Optional)
                            </label>
                            <input
                                type="date"
                                id="task-due-date"
                                name="dueDate"
                                class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                min=""
                            >
                        </div>
                        
                        <button
                            type="submit"
                            class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transform hover:scale-105 transition-all duration-200 shadow-lg hover:shadow-xl"
                        >
                            <i class="fas fa-plus mr-2"></i>Add Task
                        </button>
                    </form>
                </div>
            </div>

            <!-- Task List -->
            <div class="lg:col-span-2">
                <div class="bg-white rounded-xl shadow-lg border border-slate-200 p-6 animate-slide-in-right">
                    <div class="flex items-center justify-between mb-6">
                        <h2 class="text-xl font-semibold text-slate-900">Your Tasks</h2>
                        <div class="flex items-center space-x-2">
                            <button
                                id="filter-all"
                                class="filter-btn px-3 py-1 text-sm rounded-lg bg-blue-600 text-white"
                                data-filter="all"
                            >
                                All
                            </button>
                            <button
                                id="filter-pending"
                                class="filter-btn px-3 py-1 text-sm rounded-lg bg-slate-200 text-slate-700 hover:bg-slate-300 transition-colors duration-200"
                                data-filter="pending"
                            >
                                Pending
                            </button>
                            <button
                                id="filter-completed"
                                class="filter-btn px-3 py-1 text-sm rounded-lg bg-slate-200 text-slate-700 hover:bg-slate-300 transition-colors duration-200"
                                data-filter="completed"
                            >
                                Completed
                            </button>
                            <div class="w-px h-6 bg-slate-300 mx-2"></div>
                            <button
                                id="filter-high"
                                class="priority-filter-btn px-3 py-1 text-sm rounded-lg bg-slate-200 text-slate-700 hover:bg-red-100 hover:text-red-700 transition-colors duration-200"
                                data-priority="high"
                            >
                                <i class="fas fa-exclamation-circle mr-1"></i>High
                            </button>
                            <button
                                id="filter-medium"
                                class="priority-filter-btn px-3 py-1 text-sm rounded-lg bg-slate-200 text-slate-700 hover:bg-yellow-100 hover:text-yellow-700 transition-colors duration-200"
                                data-priority="medium"
                            >
                                <i class="fas fa-minus-circle mr-1"></i>Medium
                            </button>
                            <button
                                id="filter-low"
                                class="priority-filter-btn px-3 py-1 text-sm rounded-lg bg-slate-200 text-slate-700 hover:bg-green-100 hover:text-green-700 transition-colors duration-200"
                                data-priority="low"
                            >
                                <i class="fas fa-circle mr-1"></i>Low
                            </button>
                        </div>
                    </div>

                    <!-- Empty State -->
                    <div id="empty-state" class="text-center py-12 hidden">
                        <div class="w-16 h-16 bg-slate-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-tasks text-slate-400 text-2xl"></i>
                        </div>
                        <h3 class="text-lg font-medium text-slate-900 mb-2">No tasks yet</h3>
                        <p class="text-slate-600">Add your first task to get started!</p>
                    </div>

                    <!-- Task List Container -->
                    <div id="task-list" class="space-y-3">
                        <!-- Tasks will be dynamically added here -->
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- Task Edit Modal -->
    <div id="edit-modal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 hidden opacity-0 transition-all duration-300">
        <div class="bg-white rounded-xl shadow-2xl max-w-md w-full mx-4 transform scale-95 transition-all duration-300">
            <div class="p-6">
                <div class="flex items-center justify-between mb-4">
                    <h3 class="text-lg font-semibold text-slate-900">Edit Task</h3>
                    <button id="close-modal" class="text-slate-400 hover:text-slate-600 transition-colors duration-200">
                        <i class="fas fa-times text-xl"></i>
                    </button>
                </div>
                
                <form id="edit-task-form" class="text-slate-800 space-y-4">
                    <input type="hidden" id="edit-task-id">
                    
                    <div>
                        <label for="edit-task-title" class="block text-sm font-medium text-slate-700 mb-2">
                            Task Title
                        </label>
                        <input
                            type="text"
                            id="edit-task-title"
                            name="title"
                            required
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                        >
                    </div>
                    
                    <div>
                        <label for="edit-task-description" class="block text-sm font-medium text-slate-700 mb-2">
                            Description
                        </label>
                        <textarea
                            id="edit-task-description"
                            name="description"
                            rows="3"
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200 resize-none"
                        ></textarea>
                    </div>
                    
                    <div>
                        <label for="edit-task-priority" class="block text-sm font-medium text-slate-700 mb-2">
                            Priority
                        </label>
                        <select
                            id="edit-task-priority"
                            name="priority"
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                        >
                            <option value="low">Low</option>
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                        </select>
                    </div>
                    <div>
                        <label for="edit-task-due-date" class="block text-sm font-medium text-slate-700 mb-2">
                            Due Date
                        </label>
                        <input
                            type="date"
                            id="edit-task-due-date"
                            name="dueDate"
                            class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                            min=""
                        >
                    </div>
                    
                    <div class="flex space-x-3 pt-4">
                        <button
                            type="submit"
                            class="flex-1 px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-200"
                        >
                            Save Changes
                        </button>
                        <button
                            type="button"
                            id="cancel-edit"
                            class="flex-1 px-4 py-2 bg-slate-200 text-slate-700 rounded-lg hover:bg-slate-300 focus:outline-none focus:ring-2 focus:ring-slate-500 focus:ring-offset-2 transition-all duration-200"
                        >
                            Cancel
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- JavaScript -->
    <script th:href="@{/static/js/dashboard.js}"></script>
</body>
</html>
