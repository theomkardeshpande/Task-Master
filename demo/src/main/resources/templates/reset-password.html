<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Reset Password • TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="/static/img/logo.png">
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .auth-container {
          max-width: 600px;
          margin: -40px auto 0;
        }
    </style>
</head>
<body class="auth-page">

<header class="mb-4 text-center logo-animation">
    <i class="fas fa-check-circle text-primary fs-2 me-2"></i>
    <span class="fs-2 fw-bold">TaskMaster</span>
</header>

<div class="container d-flex align-items-center justify-content-center" style="min-height: 100vh;">
    <div class="auth-container">
        <div class="card shadow-sm">
            <div class="card-header text-center">
                <h3 class="fw-bold">Reset Password</h3>
                <p class="text-muted">Enter and confirm your new password.</p>
            </div>
            <div class="card-body">
                <!-- The token is passed as a query parameter and then set into a hidden field -->
                <form id="resetPasswordForm" th:action="@{/auth/reset-password}" th:method="post">
                    <input type="hidden" id="token" name="token" th:value="${token}" />
                    <div class="mb-3 position-relative">
                        <label for="password" class="form-label">New Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="password" name="newPassword" placeholder="••••••••" required>
                            <button type="button" class="btn btn-outline-secondary password-toggle" onclick="togglePassword('password', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>

                    <div class="mb-3 position-relative">
                        <label for="confirm" class="form-label">Confirm Password</label>
                        <div class="input-group">
                            <input type="password" class="form-control" id="confirm" placeholder="••••••••" required>
                            <button type="button" class="btn btn-outline-secondary password-toggle" onclick="togglePassword('confirm', this)">
                                <i class="fas fa-eye"></i>
                            </button>
                        </div>
                    </div>
                    <button class="btn btn-primary w-100">
                        <i class="fas fa-key me-2"></i> Reset Password
                    </button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a th:href="@{/login}" class="text-muted">
                    <i class="fas fa-arrow-left me-1"></i> Back to login
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/reset-passwordLogic.js}"></script>
</body>
</html>
