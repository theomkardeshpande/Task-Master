<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password - TaskMaster</title>
    <meta name="description" content="Create a new password for your TaskMaster account.">
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">    
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'/></svg>">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 font-inter">
    <!-- Skip to main content -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-50">
        Skip to main content
    </a>

    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200" role="navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a th:href="@{/}" class="flex items-center space-x-2 group focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded-lg">
                    <i class="fas fa-check-circle text-2xl text-blue-600 group-hover:text-blue-700 transition-colors duration-200"></i>
                    <span class="text-xl font-bold text-slate-900">TaskMaster</span>
                </a>
                <a th:href="@{/login}" class="px-4 py-2 text-blue-600 hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded-lg">
                    Back to Sign In
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <!-- Header -->
            <div class="text-center animate-slide-in-bottom">
                <div class="mx-auto h-16 w-16 bg-green-100 rounded-full flex items-center justify-center mb-6">
                    <i class="fas fa-lock text-2xl text-green-600"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-900 mb-2">Reset Password</h1>
                <p class="text-slate-600">Create a new password for your account</p>
            </div>

            <!-- Reset Password Form -->
            <form id="reset-password-form" class="mt-8 space-y-6 animate-fade-in" novalidate>
                <div class="space-y-4">
                    <!-- New Password Field -->
                    <div>
                        <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
                            New Password
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-slate-400"></i>
                            </div>
                            <input
                                id="password"
                                name="password"
                                type="password"
                                autocomplete="new-password"
                                required
                                class="form-input block w-full pl-10 pr-12 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                placeholder="Create a new password"
                                aria-describedby="password-error password-strength"
                            >
                            <button
                                type="button"
                                id="toggle-password"
                                class="absolute inset-y-0 right-0 pr-3 flex items-center focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"
                                aria-label="Toggle password visibility"
                            >
                                <i class="fas fa-eye text-slate-400 hover:text-slate-600 transition-colors duration-200"></i>
                            </button>
                        </div>
                        <div id="password-error" class="error-message hidden text-red-600 text-sm mt-1" role="alert"></div>
                        
                        <!-- Password Strength Indicator -->
                        <div id="password-strength" class="mt-2 hidden">
                            <div class="flex space-x-1 mb-1">
                                <div class="strength-bar h-1 bg-slate-200 rounded flex-1"></div>
                                <div class="strength-bar h-1 bg-slate-200 rounded flex-1"></div>
                                <div class="strength-bar h-1 bg-slate-200 rounded flex-1"></div>
                                <div class="strength-bar h-1 bg-slate-200 rounded flex-1"></div>
                            </div>
                            <p class="strength-text text-xs text-slate-500">Password strength: Weak</p>
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div>
                        <label for="confirm-password" class="block text-sm font-medium text-slate-700 mb-2">
                            Confirm New Password
                        </label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                <i class="fas fa-lock text-slate-400"></i>
                            </div>
                            <input
                                id="confirm-password"
                                name="confirm-password"
                                type="password"
                                autocomplete="new-password"
                                required
                                class="form-input block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                placeholder="Confirm your new password"
                                aria-describedby="confirm-password-error"
                            >
                        </div>
                        <div id="confirm-password-error" class="error-message hidden text-red-600 text-sm mt-1" role="alert"></div>
                    </div>
                </div>

                <!-- Submit Button -->
                <button
                    type="submit"
                    id="submit-btn"
                    class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transform hover:scale-105 transition-all duration-200 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                >
                    <span class="btn-text">Reset Password</span>
                    <div class="spinner hidden ml-2"></div>
                </button>

                <!-- Back to Sign In -->
                <div class="text-center">
                    <p class="text-sm text-slate-600">
                        Remember your password?
                        <a th:href="@{/login}" class="font-medium text-blue-600 hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded">
                            Sign in here
                        </a>
                    </p>
                </div>
            </form>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center text-sm text-slate-500">
                © 2024 TaskMaster. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script src="@{/js/reset-password.js}"></script>
</body>
</html>
