<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - TaskMaster</title>
    <meta name="description" content="Reset your TaskMaster password to regain access to your account.">
    
    <!-- Preload critical resources -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        'inter': ['Inter', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" th:href="@{/css/styles.css}">    
    
    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'/></svg>">
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 font-inter">
    <!-- Skip to main content -->
    <a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-50">
        Skip to main content
    </a>

    <!-- Navigation -->
    <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200" role="navigation">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between items-center h-16">
                <a th:href="@{/}" class="flex items-center space-x-2 group focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded-lg">
                    <i class="fas fa-check-circle text-2xl text-blue-600 group-hover:text-blue-700 transition-colors duration-200"></i>
                    <span class="text-xl font-bold text-slate-900">TaskMaster</span>
                </a>
                <a th:href="@{/login}" class="px-4 py-2 text-blue-600 hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded-lg">
                    Back to Sign In
                </a>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main id="main-content" class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8">
            <!-- Form Container -->
            <div id="form-container" class="animate-slide-in-bottom">
                <!-- Header -->
                <div class="text-center">
                    <div class="mx-auto h-16 w-16 bg-orange-100 rounded-full flex items-center justify-center mb-6">
                        <i class="fas fa-key text-2xl text-orange-600"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-900 mb-2">Forgot Password?</h1>
                    <p class="text-slate-600">No worries! Enter your email and full name to reset your password.</p>
                </div>

                <!-- Forgot Password Form -->
                <form id="forgot-password-form" class="text-slate-800 mt-8 space-y-6 animate-fade-in" novalidate>
                    <div class="space-y-4">
                        <!-- Email Field -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-slate-700 mb-2">
                                Email address
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <!-- <i class="fas fa-envelope text-slate-400"></i> -->
                                    <span
                                        class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 z-10 pointer-events-none">
                                        <!-- SVG icon here -->
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5">
                                            <path d="M1.5 8.67v8.58a3 3 0 0 0 3 3h15a3 3 0 0 0 3-3V8.67l-8.928 5.493a3 3 0 0 1-3.144 0L1.5 8.67Z" />
                                            <path d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908Z" />
                                        </svg>  
                                    </span>
                                </div>
                                <input
                                    id="email"
                                    name="email"
                                    type="email"
                                    autocomplete="email"
                                    required
                                    class="form-input block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                    placeholder="Enter your email"
                                    aria-describedby="email-error"
                                >
                            </div>
                            <div id="email-error" class="error-message hidden text-red-600 text-sm mt-1" role="alert"></div>
                        </div>

                        <!-- Full Name Field -->
                        <div>
                            <label for="fullname" class="block text-sm font-medium text-slate-700 mb-2">
                                Full Name
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <!-- <i class="fas fa-user text-slate-400"></i> -->
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 z-10 pointer-events-none">
                                        <!-- SVG icon here -->
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="size-5">
                                            <path fill-rule="evenodd" d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z" clip-rule="evenodd" />
                                        </svg>                                            
                                    </span>
                                </div>
                                <input
                                    id="fullname"
                                    name="fullname"
                                    type="text"
                                    autocomplete="name"
                                    required
                                    class="form-input block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                    placeholder="Enter your full name"
                                    aria-describedby="fullname-error"
                                >
                            </div>
                            <div id="fullname-error" class="error-message hidden text-red-600 text-sm mt-1" role="alert"></div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button
                        type="submit"
                        id="submit-btn"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transform hover:scale-105 transition-all duration-200 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none"
                    >
                        <span class="btn-text">Send Reset Link</span>
                        <div class="spinner hidden ml-2"></div>
                    </button>

                    <!-- Back to Sign In -->
                    <div class="text-center">
                        <p class="text-sm text-slate-600">
                            Remember your password?
                            <a th:href="@{/login}" class="font-medium text-blue-600 hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded">
                                Sign in here
                            </a>
                        </p>
                    </div>
                </form>
            </div>

            <!-- Success Container -->
            <div id="success-container" class="hidden text-center">
                <div class="mx-auto h-16 w-16 bg-green-100 rounded-full flex items-center justify-center mb-6">
                    <i class="fas fa-check-circle text-2xl text-green-600"></i>
                </div>
                <h1 class="text-3xl font-bold text-slate-900 mb-2">Check Your Email</h1>
                <p class="text-slate-600 mb-6">
                    We've sent a password reset link to
                    <span id="sent-email" class="font-medium text-slate-900"></span>
                </p>
                <div class="space-y-4">
                    <button
                        id="send-another-btn"
                        class="w-full px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transform hover:scale-105 transition-all duration-200 shadow-lg hover:shadow-xl"
                    >
                        Send Another Email
                    </button>
                    <a th:href="@{/login}" class="block w-full px-4 py-2 border border-slate-300 text-slate-700 rounded-lg hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 transition-all duration-200 text-center">
                        Back to Sign In
                    </a>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 py-6">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="text-center text-sm text-slate-500">
                © 2024 TaskMaster. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- JavaScript -->
    <script th:src="@{/js/forgot-password.js}"></script>
</body>
</html>
