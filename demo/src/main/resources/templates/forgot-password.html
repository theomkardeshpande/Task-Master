<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet" />
    <link rel="icon" type="image/x-icon" th:href="@{/img/logo.png}">
    <link rel="stylesheet" th:href="@{/css/styles.css}" />
    <style>
        body.auth-page {
            position: relative;
            overflow-x: hidden;
        }
        body.auth-page::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            height: 100vh;
            width: 100vw;
            background: linear-gradient(135deg, rgba(13, 110, 253, 0.2), rgba(108, 117, 125, 0.2)),
                        url('https://www.toptal.com/designers/subtlepatterns/patterns/scribble_light.png');
            background-size: cover;
            z-index: -1;
            opacity: 0.8;
        }
        .logo-animation {
            animation: fadeIn 1s ease-in-out;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: var(--box-shadow-lg);
        }
        .auth-container {
            max-width: 600px;
            width: 100%;
            margin: 0 auto;
            padding: 1rem;
            margin-top: -100px;
        }
    </style>
    <!-- ✅ BUG 1 FIXED: Removed the stray <button> tag that was inside <script> -->
</head>
<body class="auth-page">

<!-- Header with TaskMaster Logo -->
<nav class="navbar navbar-light bg-transparent py-3">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <i class="fas fa-check-circle text-primary me-2 fs-4"></i>
            <span class="fw-bold fs-4">TaskMaster</span>
        </a>
    </div>
</nav>

<!-- Main Container -->
<div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
    <div class="auth-container">
        <div class="card shadow-sm">
            <div class="card-header text-center">
                <h3 class="fw-bold">Forgot Password</h3>
                <p class="text-muted">Enter your email below to receive a reset link.</p>
            </div>
            <div class="card-body">
                <form id="forgotPasswordForm" th:action="@{/auth/forgot-password}" method="post">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input
                                type="email"
                                class="form-control"
                                id="email"
                                name="email"
                                placeholder="you@example.com"
                                required
                        />
                        <label for="fullname" class="form-label mt-2">Full Name</label>
                        <input
                                type="text"
                                class="form-control"
                                id="fullname"
                                name="fullname"
                                placeholder="John Doe"
                                required
                        />
                    </div>
                    <!-- ✅ BUG 2 FIXED: Added id="submitBtn" to match getElementById in JS -->
                    <button type="submit" class="btn btn-primary w-100" id="submitBtn">
                        <i class="fas fa-envelope me-2"></i>
                        Send Reset Link
                    </button>
                </form>
            </div>
            <div class="card-footer text-center">
                <a th:href="@{/login}" class="text-muted">
                    <i class="fas fa-arrow-left me-1"></i>
                    Back to Login
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Bootstrap JS Bundle -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/forgot-passwordLogic.js}"></script>
</body>
</html>
