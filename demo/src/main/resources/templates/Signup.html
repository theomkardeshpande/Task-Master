<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <script lang="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            // Password toggle functionality
            const passwordToggles = document.querySelectorAll('.password-toggle');
            passwordToggles.forEach(toggle => {
                toggle.addEventListener('click', function() {
                    const passwordInput = this.previousElementSibling;
                    const icon = this.querySelector('i');

                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        passwordInput.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
        });
    </script>
</head>
<body class="auth-page">
<!-- Navigation -->
<nav class="navbar navbar-light bg-transparent py-3">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <i class="fas fa-check-circle text-primary me-2 fs-4"></i>
            <span class="fw-bold fs-4">TaskMaster</span>
        </a>
    </div>
</nav>

<!-- Sign Up Form -->

<div class="card border-0 shadow-lg">
    <div class="d-flex">
        <div class="toast-body">
            <p th:text="${message}"></p>
        </div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
    </div>

    <div class="container-fluid d-flex align-items-center justify-content-center flex-grow-1 py-5">
        <div class="auth-container">
            <div class="text-center mb-4">
                <h1 class="h2 fw-bold">Create an account</h1>
                <p class="text-muted">Sign up to start organizing your tasks</p>
            </div>
            <div class="card-body p-4">
                <form id="signupForm" th:action="@{/register}" th:method="post" th:object="${user}" novalidate>
                    <div class="mb-3">
                        <label for="name" class="form-label">Full Name</label>
                        <input type="text" th:field="*{fullname}" class="form-control" id="name" placeholder="John Doe"
                               required>
                        <div class="text-danger" th:if="${#fields.hasErrors('fullname')}" th:errors="*{fullname}"></div>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" th:field="*{email}" class="form-control" id="email"
                               placeholder="you@example.com" required>
                        <div class="text-danger" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <div class="position-relative">
                            <input type="password" th:field="*{password}" class="form-control" id="password"
                                   placeholder="••••••••" required>
                            <button type="button"
                                    class="btn btn-link position-absolute end-0 top-50 translate-middle-y password-toggle"
                                    style="border: none; background: none;">
                                <i class="fas fa-eye text-muted"></i>
                            </button>
                        </div>
                        <div class="text-danger" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                        <div class="invalid-feedback"></div>
                        <div class="form-text">Password must be at least 3 characters long</div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <span class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
                        Create Account
                    </button>
                </form>

                <div class="text-center">
                    <p class="text-muted small mb-0">
                        Already have an account?
                        <a th:href="@{/login}" class="text-primary text-decoration-none">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-light py-3 mt-auto">
    <div class="container text-center">
        <p class="text-muted small mb-0">&copy; 2024 TaskMaster. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
