<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Sign Up - TaskMaster</title>
        <meta name="description" content="Create your TaskMaster account to start managing your tasks efficiently.">

        <!-- Preload critical resources -->
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

        <!-- Tailwind CSS -->
        <script src="https://cdn.tailwindcss.com"></script>
        <script>
            tailwind.config = {
                theme: {
                    extend: {
                        fontFamily: {
                            'inter': ['Inter', 'system-ui', 'sans-serif'],
                        }
                    }
                }
            }
        </script>

        <!-- Font Awesome -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

        <!-- Custom Styles -->
        <link rel="stylesheet" th:href="@{/css/styles.css}">

        <!-- Favicon -->
        <link rel="icon" type="image/svg+xml"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%233b82f6'><path d='M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z'/></svg>">
    </head>

    <body class="min-h-screen bg-gradient-to-br from-slate-50 to-blue-50 font-inter">
        <!-- Skip to main content -->
        <a href="#main-content"
            class="sr-only focus:not-sr-only focus:absolute focus:top-4 focus:left-4 bg-blue-600 text-white px-4 py-2 rounded-lg z-50">
            Skip to main content
        </a>

        <!-- Navigation -->
        <nav class="bg-white/80 backdrop-blur-md border-b border-slate-200" role="navigation">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between items-center h-16">
                    <a th:href="@{/}"
                        class="flex items-center space-x-2 group focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded-lg">
                        <i
                            class="fas fa-check-circle text-2xl text-blue-600 group-hover:text-blue-700 transition-colors duration-200"></i>
                        <span class="text-xl font-bold text-slate-900">TaskMaster</span>
                    </a>
                    <a th:href="@{/auth/login}"
                        class="px-4 py-2 text-blue-600 hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded-lg">
                        Already have an account? Sign in
                    </a>
                </div>
            </div>
        </nav>

        <!-- Main Content -->
        <main id="main-content" class="flex-1 flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
            <div class="max-w-md w-full space-y-8">
                <!-- Header -->
                <div class="text-center animate-slide-in-bottom">
                    <div class="mx-auto h-16 w-16 bg-blue-100 rounded-full flex items-center justify-center mb-6">
                        <i class="fas fa-user-plus text-2xl text-blue-600"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-slate-900 mb-2">Create your account</h1>
                    <p class="text-slate-600">Join TaskMaster and start organizing your tasks</p>
                </div>

                <!-- Registration Form -->
                <form id="register-form" class="text-slate-800 mt-8 space-y-6 animate-fade-in" novalidate>
                    <div class="space-y-4">
                        <!-- Full Name Field -->
                        <div>
                            <label for="fullname" class="block text-sm font-medium text-slate-700 mb-2">
                                Full Name
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <!-- <i class="fas fa-user text-slate-400"></i> -->
                                    <span
                                        class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 z-10 pointer-events-none">
                                        <!-- SVG icon here -->
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                            class="size-5">
                                            <path fill-rule="evenodd"
                                                d="M7.5 6a4.5 4.5 0 1 1 9 0 4.5 4.5 0 0 1-9 0ZM3.751 20.105a8.25 8.25 0 0 1 16.498 0 .75.75 0 0 1-.437.695A18.683 18.683 0 0 1 12 22.5c-2.786 0-5.433-.608-7.812-1.7a.75.75 0 0 1-.437-.695Z"
                                                clip-rule="evenodd" />
                                        </svg>
                                    </span>
                                </div>
                                <input id="fullname" name="fullname" type="text" autocomplete="name" required
                                    class="form-input block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                    placeholder="Enter your full name" aria-describedby="fullname-error">
                            </div>
                            <div id="fullname-error" class="error-message hidden text-red-600 text-sm mt-1"
                                role="alert"></div>
                        </div>

                        <!-- Email Field -->
                        <div>
                            <label for="email" class="block text-sm font-medium text-slate-700 mb-2">
                                Email address
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <!-- <i class="fas fa-envelope text-slate-400"></i> -->
                                    <span
                                        class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 z-10 pointer-events-none">
                                        <!-- SVG icon here -->
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                            class="size-5">
                                            <path
                                                d="M1.5 8.67v8.58a3 3 0 0 0 3 3h15a3 3 0 0 0 3-3V8.67l-8.928 5.493a3 3 0 0 1-3.144 0L1.5 8.67Z" />
                                            <path
                                                d="M22.5 6.908V6.75a3 3 0 0 0-3-3h-15a3 3 0 0 0-3 3v.158l9.714 5.978a1.5 1.5 0 0 0 1.572 0L22.5 6.908Z" />
                                        </svg>
                                    </span>
                                </div>
                                <input id="email" name="email" type="email" autocomplete="email" required
                                    class="form-input block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                    placeholder="Enter your email" aria-describedby="email-error">
                            </div>
                            <div id="email-error" class="error-message hidden text-red-600 text-sm mt-1" role="alert">
                            </div>
                        </div>

                        <!-- Password Field -->
                        <div>
                            <label for="password" class="block text-sm font-medium text-slate-700 mb-2">
                                Password
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <!-- <i class="fas fa-lock text-slate-400"></i> -->
                                    <span
                                        class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 z-10 pointer-events-none">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                            class="size-5">
                                            <path fill-rule="evenodd"
                                                d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3c0-2.9-2.35-5.25-5.25-5.25Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z"
                                                clip-rule="evenodd" />
                                        </svg>
                                    </span>
                                </div>
                                <input id="password" name="password" type="password" autocomplete="new-password"
                                    required
                                    class="form-input block w-full pl-10 pr-12 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                    placeholder="Create a password" aria-describedby="password-error password-strength">
                                <button type="button" id="toggle-password"
                                    class="absolute inset-y-0 right-0 pr-3 flex items-center focus:outline-none focus:ring-2 focus:ring-blue-500 rounded"
                                    aria-label="Toggle password visibility">
                                    <i class="fas fa-eye text-slate-400 hover:text-slate-600 transition-colors duration-200"></i>
                                </button>
                            </div>
                            <div id="password-error" class="error-message hidden text-red-600 text-sm mt-1"
                                role="alert"></div>

                            <!-- Password Strength Indicator -->
                            <div id="password-strength" class="mt-2 hidden">
                                <div class="flex space-x-1 mb-1">
                                    <div class="strength-bar h-1 bg-slate-200 rounded flex-1"></div>
                                    <div class="strength-bar h-1 bg-slate-200 rounded flex-1"></div>
                                    <div class="strength-bar h-1 bg-slate-200 rounded flex-1"></div>
                                    <div class="strength-bar h-1 bg-slate-200 rounded flex-1"></div>
                                </div>
                                <p class="strength-text text-xs text-slate-500">Password strength: Weak</p>
                            </div>
                        </div>

                        <!-- Confirm Password Field -->
                        <div>
                            <label for="confirm-password" class="block text-sm font-medium text-slate-700 mb-2">
                                Confirm Password
                            </label>
                            <div class="relative">
                                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <!-- <i class="fas fa-lock text-slate-400"></i> -->
                                    <span
                                        class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-400 z-10 pointer-events-none">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor"
                                            class="size-5">
                                            <path fill-rule="evenodd"
                                                d="M12 1.5a5.25 5.25 0 0 0-5.25 5.25v3a3 3 0 0 0-3 3v6.75a3 3 0 0 0 3 3h10.5a3 3 0 0 0 3-3v-6.75a3 3 0 0 0-3-3v-3c0-2.9-2.35-5.25-5.25-5.25Zm3.75 8.25v-3a3.75 3.75 0 1 0-7.5 0v3h7.5Z"
                                                clip-rule="evenodd" />
                                        </svg>
                                    </span>
                                </div>
                                <input id="confirm-password" name="confirm-password" type="password"
                                    autocomplete="new-password" required
                                    class="form-input block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-all duration-200"
                                    placeholder="Confirm your password" aria-describedby="confirm-password-error">
                            </div>
                            <div id="confirm-password-error" class="error-message hidden text-red-600 text-sm mt-1"
                                role="alert"></div>
                        </div>
                    </div>

                    <!-- Terms and Conditions -->
                    <div class="flex items-start">
                        <div class="flex items-center h-5">
                            <input id="terms" name="terms" type="checkbox" required
                                class="h-4 w-4 text-blue-600 focus:ring-blue-500 border-slate-300 rounded transition-colors duration-200">
                        </div>
                        <div class="ml-3 text-sm">
                            <label for="terms" class="text-slate-700">
                                I agree to the
                                <a href="#"
                                    class="text-blue-600 hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded">Terms
                                    of Service</a>
                                and
                                <a href="#"
                                    class="text-blue-600 hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded">Privacy
                                    Policy</a>
                            </label>
                            <div id="terms-error" class="error-message hidden text-red-600 text-sm mt-1" role="alert">
                            </div>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" id="submit-btn"
                        class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-lg text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transform hover:scale-105 transition-all duration-200 shadow-lg hover:shadow-xl disabled:opacity-50 disabled:cursor-not-allowed disabled:transform-none">
                        <span class="btn-text">Create Account</span>
                        <div class="spinner hidden ml-2"></div>
                    </button>

                    <!-- Sign In Link -->
                    <div class="text-center">
                        <p class="text-sm text-slate-600">
                            Already have an account?
                            <a th:href="@{/auth/login}"
                                class="font-medium text-blue-600 hover:text-blue-700 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2 rounded">
                                Sign in here
                            </a>
                        </p>
                    </div>
                </form>
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-slate-200 py-6">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="text-center text-sm text-slate-500">
                    © 2024 TaskMaster. All rights reserved.
                </div>
            </div>
        </footer>

        <!-- JavaScript -->
        <script th:src="@{/js/register.js}"></script>
    </body>

</html>
