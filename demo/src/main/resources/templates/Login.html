<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - TaskMaster</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link th:href="@{/css/styles.css}" rel="stylesheet">
    <script lang="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            // Password toggle functionality
            const passwordToggles = document.querySelectorAll('.password-toggle');
            passwordToggles.forEach(toggle => {
                toggle.addEventListener('click', function() {
                    const passwordInput = this.previousElementSibling;
                    const icon = this.querySelector('i');

                    if (passwordInput.type === 'password') {
                        passwordInput.type = 'text';
                        icon.classList.remove('fa-eye');
                        icon.classList.add('fa-eye-slash');
                    } else {
                        passwordInput.type = 'password';
                        icon.classList.remove('fa-eye-slash');
                        icon.classList.add('fa-eye');
                    }
                });
            });
        });
    </script>
</head>
<body class="auth-page">
<!-- Navigation -->
<nav class="navbar navbar-light bg-transparent py-3">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/}">
            <i class="fas fa-check-circle text-primary me-2 fs-4"></i>
            <span class="fw-bold fs-4">TaskMaster</span>
        </a>
    </div>
</nav>

<!-- Sign In Form -->
<div class="container-fluid d-flex align-items-center justify-content-center flex-grow-1 py-5">
    <div class="auth-container">
        <div class="text-center mb-4">
            <h1 class="h2 fw-bold">Welcome back</h1>
            <p class="text-muted">Sign in to your account to continue</p>
        </div>

        <div class="card border-0 shadow-lg">
            <div class="card-body p-4">
                <p th:if="${param.error}">Invalid email or password.</p>
                <p th:if="${param.logout}">Successfully logged out.</p>
                <form id="signinForm" th:action="@{/login}" th:method="post" novalidate>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" name="email" id="email" placeholder="you@example.com"
                               required>
                        <div class="invalid-feedback"></div>
                    </div>

                    <div class="mb-3">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <label for="password" class="form-label">Password</label>
                            <a th:href="@{/forgotPassword}" class="text-primary text-decoration-none small">Forgot
                                password?</a>
                        </div>
                        <div class="position-relative">
                            <input type="password" class="form-control" name="password" id="password"
                                   placeholder="••••••••" required>
                            <button type="button"
                                    class="btn btn-link position-absolute end-0 top-50 translate-middle-y password-toggle"
                                    style="border: none; background: none;">
                                <i class="fas fa-eye text-muted"></i>
                            </button>
                        </div>
                        <div class="invalid-feedback"></div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">
                        <span class="spinner-border spinner-border-sm me-2 d-none" role="status"></span>
                        Sign In
                    </button>
                </form>

                <div class="text-center">
                    <p class="text-muted small mb-0">
                        Don't have an account?
                        <a th:href="@{/register}" class="text-primary text-decoration-none">Sign up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- Footer -->
<footer class="bg-light py-3 mt-auto">
    <div class="container text-center">
        <p class="text-muted small mb-0">&copy; 2024 TaskMaster. All rights reserved.</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<!--<script src="/static/js/auth.js"></script>-->
</body>
</html>
